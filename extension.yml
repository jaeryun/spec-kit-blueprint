schema_version: "1.0"

extension:
  id: blueprint
  name: "Blueprint"
  version: "0.3.0"
  description: "Vision-first project planning that decomposes ideas into right-sized Spec Outlines for SpecKit."
  author: "jaeryun"
  repository: "https://github.com/jaeryun/spec-kit-blueprint"
  license: MIT

requires:
  speckit_version: ">=0.4.0"

hooks:
  after_blueprint_vision:
    command: "speckit.blueprint._vision-roadmap-check"
    optional: true
    description: "Notify user if roadmap.md may need updating after vision changes."

  before_blueprint_roadmap:
    command: "speckit.blueprint._vision-check"
    optional: false
    description: "Validate vision alignment before roadmap generation."

  after_blueprint_roadmap:
    command: "speckit.blueprint._vision-sync"
    optional: true
    description: "Sync vision.md if roadmap planning revealed scope changes."

  before_specify:
    command: "speckit.blueprint._roadmap-check"
    optional: false
    description: "Validate feature aligns with Spec Outlines in roadmap.md before specifying."

  after_specify:
    command: "speckit.blueprint._roadmap-sync"
    optional: false
    description: "Sync Spec Outline and roadmap stage status after a spec is completed."

provides:
  commands:
    - name: speckit.blueprint.vision
      file: commands/vision.md
      description: "Define project vision through an adaptive interview."

    - name: speckit.blueprint.roadmap
      file: commands/roadmap.md
      description: "Generate a staged delivery roadmap with Spec Outlines and dependency mapping (3 phases: stage definition → Spec Outline sizing → dependency mapping)."

    - name: speckit.blueprint._vision-check
      file: commands/_vision-check.md
      description: "Pre-flight check: validate vision alignment before roadmap generation."

    - name: speckit.blueprint._vision-sync
      file: commands/_vision-sync.md
      description: "Post-roadmap sync: update vision.md if roadmap planning revealed scope changes."

    - name: speckit.blueprint._vision-roadmap-check
      file: commands/_vision-roadmap-check.md
      description: "Post-vision check: notify if roadmap.md exists and may need updating after vision changes."

    - name: speckit.blueprint._roadmap-check
      file: commands/_roadmap-check.md
      description: "Pre-flight check: validate feature aligns with a Spec Outline in roadmap.md before specify."

    - name: speckit.blueprint._roadmap-sync
      file: commands/_roadmap-sync.md
      description: "Post-specify sync: update Spec Outline and roadmap stage status in roadmap.md after completion."

  hooks:
    - event: before_blueprint_vision
      description: "Triggered before the vision interview begins."

    - event: after_blueprint_vision
      description: "Triggered after vision.md is confirmed and saved."

    - event: before_blueprint_roadmap
      description: "Triggered before roadmap generation begins."

    - event: after_blueprint_roadmap
      description: "Triggered after roadmap.md is confirmed and saved."

    - event: before_blueprint_decompose
      description: "Deprecated. Previously triggered before Spec Outline decomposition. The decompose command has been merged into roadmap."

    - event: after_blueprint_decompose
      description: "Deprecated. Previously triggered after spec-outlines.md was generated. Spec Outlines now live inside roadmap.md."

tags:
  - planning
  - vision
  - roadmap
  - project-management
