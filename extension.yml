schema_version: "1.0"

extension:
  id: blueprint
  name: "Blueprint"
  version: "2.1.0"
  description: "Vision-first project planning for SpecKit. Decomposes project vision into a 3-level hierarchy: Epic → Story → Feature — each Feature mapping to one /speckit.specify run."
  author: "jaeryun"
  repository: "https://github.com/jaeryun/spec-kit-blueprint"
  license: MIT

requires:
  speckit_version: ">=0.4.0"

hooks:
  before_specify:
    command: "speckit.blueprint.jira-fetch-context-hook"
    optional: false
    description: "Fetch Jira context (Epic/Story hierarchy and current status) before specifying."

  before_plan:
    command: "speckit.blueprint.jira-fetch-context-hook"
    optional: false
    description: "Fetch Jira context before planning begins."

  before_tasks:
    command: "speckit.blueprint.jira-fetch-context-hook"
    optional: false
    description: "Fetch Jira context before task breakdown begins."

provides:
  commands:
    - name: speckit.blueprint.setup
      file: commands/setup.md
      description: "Initialize Blueprint workspace and configuration."

    - name: speckit.blueprint.vision
      file: commands/vision.md
      description: "Define project vision through an adaptive interview."

    - name: speckit.blueprint.roadmap
      file: commands/roadmap.md
      description: "Generate the Epic→Story hierarchy from the confirmed vision."

    - name: speckit.blueprint.sync-story
      file: commands/sync-story.md
      description: "Create or update story.md (technical Source of Truth) for a given Story."

    - name: speckit.blueprint.jira-sync-hierarchy-hook
      file: commands/jira-sync-hierarchy-hook.md
      description: "Sync Epic→Story hierarchy to Jira after roadmap generation."

    - name: speckit.blueprint.jira-fetch-context-hook
      file: commands/jira-fetch-context-hook.md
      description: "Fetch Jira context (Epic/Story hierarchy and current status) for hook consumption."

    # v1 backward compatibility — deprecated, remove after migration
    - name: speckit.blueprint.roadmap
      file: commands/roadmap.md
      description: "(v1, deprecated) Decomposes vision into Spec Outlines — use /speckit.blueprint.roadmap"

    - name: speckit.blueprint.roadmap-check
      file: commands/roadmap-check.md
      description: "(v1, deprecated) Pre-flight check for Spec Outline alignment — use /speckit.blueprint.jira-fetch-context-hook"

    - name: speckit.blueprint.roadmap-sync
      file: commands/roadmap-sync.md
      description: "(v1, deprecated) Sync spec links to roadmap — use /speckit.blueprint.jira-sync-hierarchy-hook"

  hooks:
    - event: before_blueprint_setup
      description: "Triggered before Blueprint workspace setup begins."

    - event: after_blueprint_setup
      description: "Triggered after Blueprint workspace setup completes."

    - event: before_blueprint_vision
      description: "Triggered before the vision interview begins."

    - event: after_blueprint_vision
      description: "Triggered after vision.md is confirmed and saved."

    - event: before_blueprint_roadmap
      description: "Triggered before Epic→Story hierarchy generation begins."

    - event: after_blueprint_roadmap
      description: "Triggered after the Epic→Story hierarchy is confirmed and saved. Use to create Jira Epics/Stories."

    - event: before_blueprint_sync_story
      description: "Triggered before story.md generation begins."

    - event: after_blueprint_sync_story
      description: "Triggered after story.md is saved. Use to link Jira Story."

tags:
  - planning
  - vision
  - roadmap
  - epics
  - project-management
