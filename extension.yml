schema_version: "1.0"

extension:
  id: blueprint
  name: "Blueprint"
  version: "1.0.0"
  description: "Vision-first project planning that decomposes ideas into right-sized Spec Outlines for SpecKit."
  author: "jaeryun"
  repository: "https://github.com/jaeryun/spec-kit-blueprint"
  license: MIT

requires:
  speckit_version: ">=0.4.0"

hooks:
  before_specify:
    command: "speckit.blueprint.roadmap-check"
    optional: false
    description: "Validate feature aligns with Spec Outlines in roadmap.md before specifying."

  after_specify:
    command: "speckit.blueprint.roadmap-sync"
    optional: false
    description: "Scan specs/ for unlinked spec files and link each one to its matching Spec Outline in roadmap.md."

  after_clarify:
    command: "speckit.blueprint.roadmap-sync"
    optional: true
    description: "Scan specs/ for unlinked spec files and link each one to its matching Spec Outline in roadmap.md. Optional because clarify may not produce a new spec file."

provides:
  commands:
    - name: speckit.blueprint.vision
      file: commands/vision.md
      description: "Define project vision through an adaptive interview."

    - name: speckit.blueprint.roadmap
      file: commands/roadmap.md
      description: "Generate a delivery roadmap of Spec Outlines from the confirmed vision."

    - name: speckit.blueprint.roadmap-check
      file: commands/roadmap-check.md
      description: "Pre-flight check: validate feature aligns with a Spec Outline in roadmap.md before specify."

    - name: speckit.blueprint.roadmap-sync
      file: commands/roadmap-sync.md
      description: "Link generated spec file to Spec Outline in roadmap.md after a spec is completed."

  hooks:
    - event: before_blueprint_vision
      description: "Triggered before the vision interview begins."

    - event: after_blueprint_vision
      description: "Triggered after vision.md is confirmed and saved."

    - event: before_blueprint_roadmap
      description: "Triggered before roadmap generation begins."

    - event: after_blueprint_roadmap
      description: "Triggered after roadmap.md is confirmed and saved."


tags:
  - planning
  - vision
  - roadmap
  - project-management
