schema_version: "1.0"

extension:
  id: blueprint
  name: "Blueprint"
  version: "1.2.1"
  description: "Vision-first project planning for SpecKit. Decomposes project vision into a 3-level hierarchy: Epic → Story → Feature — each Feature mapping to one /speckit.specify run."
  author: "jaeryun"
  repository: "https://github.com/jaeryun/spec-kit-blueprint"
  license: MIT

requires:
  speckit_version: ">=0.4.0"

provides:
  commands:
    - name: speckit.blueprint.vision
      file: commands/vision.md
      description: "Define project vision through an adaptive interview."

    - name: speckit.blueprint.design
      file: commands/design.md
      description: "Generate the Epic→Story→Feature hierarchy from the confirmed vision."

    - name: speckit.blueprint.archive
      file: commands/archive.md
      description: "Archive a completed FT into the project's Knowledge Base under docs/."  

    - name: speckit.blueprint.link-spec
      file: commands/link-spec.md
      description: "Link a Feature to its spec directory in blueprint.md after /speckit.specify."

  hooks:
    - event: before_blueprint_vision
      description: "Triggered before the vision interview begins."

    - event: after_blueprint_vision
      description: "Triggered after vision.md is confirmed and saved."

    - event: before_blueprint_design
      description: "Triggered before Epic→Story hierarchy generation begins."

    - event: after_blueprint_design
      description: "Triggered after the Epic→Story hierarchy is confirmed and saved."

    - event: before_blueprint_archive
      description: "Triggered before FT knowledge archiving begins."

    - event: after_blueprint_archive
      description: "Triggered after FT knowledge is archived to the configured docs base path."

    - event: before_blueprint_link_spec
      description: "Triggered before linking a FT to its spec directory in blueprint.md."

    - event: after_blueprint_link_spec
      description: "Triggered after a FT is linked to its spec directory in blueprint.md."

  config:
    - name: ".specify/config-bp.yml"
      template: "templates/config-bp.template.yml"
      required: false
      description: "Blueprint extension configuration."

tags:
  - planning
  - vision
  - blueprint
  - epics
  - project-management
