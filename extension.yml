schema_version: "1.0"

extension:
  id: blueprint
  name: "Blueprint"
  version: "2.0.0"
  description: "Vision-first project planning for SpecKit. Decomposes project vision into a 3-level hierarchy: Epic → Story → Feature — each Feature mapping to one /speckit.specify run."
  author: "jaeryun"
  repository: "https://github.com/jaeryun/spec-kit-blueprint"
  license: MIT

requires:
  speckit_version: ">=0.4.0"

hooks:
  before_specify:
    command: "speckit.blueprint.epics-check"
    optional: false
    description: "Validate feature (FT) aligns with a Story in the epics hierarchy before specifying."

  after_specify:
    command: "speckit.blueprint.epics-sync"
    optional: false
    description: "Link generated FT spec to its Story in the epics hierarchy after specify completes."

  after_clarify:
    command: "speckit.blueprint.epics-sync"
    optional: true
    description: "Sync FT spec link after clarify. Optional because clarify may not produce a new spec."

provides:
  commands:
    - name: speckit.blueprint.vision
      file: commands/vision.md
      description: "Define project vision through an adaptive interview."

    - name: speckit.blueprint.epics
      file: commands/epics.md
      description: "Generate the Epic→Story hierarchy from the confirmed vision."

    - name: speckit.blueprint.story
      file: commands/story.md
      description: "Create or update story.md (technical Source of Truth) for a given Story."

    - name: speckit.blueprint.epics-check
      file: commands/epics-check.md
      description: "Pre-flight check: validate FT aligns with a Story in the epics hierarchy before specify."

    - name: speckit.blueprint.epics-sync
      file: commands/epics-sync.md
      description: "Link generated FT spec to its Story after specify completes."

  hooks:
    - event: before_blueprint_vision
      description: "Triggered before the vision interview begins."

    - event: after_blueprint_vision
      description: "Triggered after vision.md is confirmed and saved."

    - event: before_blueprint_epics
      description: "Triggered before Epic→Story hierarchy generation begins."

    - event: after_blueprint_epics
      description: "Triggered after the Epic→Story hierarchy is confirmed and saved. Use to create Jira Epics/Stories."

    - event: before_blueprint_story
      description: "Triggered before story.md generation begins."

    - event: after_blueprint_story
      description: "Triggered after story.md is saved. Use to link Jira Story."

    - event: after_feature_complete
      description: "Triggered after a Feature (FT) PR is merged and story.md is updated."

tags:
  - planning
  - vision
  - roadmap
  - epics
  - project-management
